name: Reorganize OOPSBannerApp variants

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reorg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Create variant branches and clean main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/Varun-ofl/OOPSBannerApp.git

          git fetch --all

          VARIANT_FILES=(OOPSBannerApp2.java OOPSBannerApp3.java OOPSBannerApp4.java OOPSBannerApp5.java OOPSBannerApp6.java OOPSBannerApp7.java OOPSBannerApp8.java)

          for f in "${VARIANT_FILES[@]}"; do
            n="${f//[!0-9]/}"
            branch="variant-$n"

            # --diff-filter=d (lowercase) EXCLUDES deletion commits,
            # so this returns the commit where the file was last PRESENT (added/modified),
            # not the commit that deleted it.
            FCOMMIT=$(git log --all --diff-filter=d --format="%H" -1 -- "$f")

            if [ -z "$FCOMMIT" ]; then
              echo "Skipping $f — not found in git history"
              continue
            fi

            echo "Restoring $f from commit $FCOMMIT — creating branch $branch"
            git checkout -B "$branch" origin/main
            git show "${FCOMMIT}:${f}" > OOPSBannerApp.java

            for vf in "${VARIANT_FILES[@]}"; do
              git rm -f "$vf" 2>/dev/null || true
            done

            git add OOPSBannerApp.java
            git commit -m "$branch: use $f as OOPSBannerApp.java"
            git push -f origin "$branch"
            echo "Pushed $branch"
          done

          # main cleanup (variant files already gone from earlier run, but be safe)
          git checkout main
          git reset --hard origin/main
          CHANGED=false
          for vf in "${VARIANT_FILES[@]}"; do
            if git ls-files --error-unmatch "$vf" 2>/dev/null; then
              git rm -f "$vf"
              CHANGED=true
            fi
          done
          if [ "$CHANGED" = true ]; then
            git commit -m "Remove variant files; OOPSBannerApp.java is the canonical main file"
            git push origin main
          else
            echo "main already clean"
          fi
